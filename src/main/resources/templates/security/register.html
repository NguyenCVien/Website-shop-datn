<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
        integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous" />
    <link rel="stylesheet" href="/src/main/resources/static/assets/css/register.css">
</head>

<body>
    <div id="wrapper">
        <div class="container">
            <h1 class="text-center text-uppercase h3 ">Đăng ký tài khoản ShopNow</h1>
            <div class="row justify-content-around">
                <form action="" class="col-sm-6 bg-light py-3">
                    
                    <div class="form-group ">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" name="username" id="username" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Xác nhận mật khẩu</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>

                </form>
                <form action="" class="col-sm-6 bg-light ">
                    <div class="form-group mt-3">
                        <label for="fullname" >Họ và tên</label>
                        <input type="text" name="fullname" id="fullname" class="form-control" required>
                    </div>
                    <input type="submit" value="Đăng ký" class="btn-primary btn-lg btn btn-block mt-5">
                    <hr>
                    <h1 class=" text-uppercase h6 py-1">Đăng ký với</h1>
                    <div class="d-grid">
                        <button class=" btn-lg btn-facebook btn-block fw-bold text-uppercase" type="submit">
                            <i class="fab fa-facebook-f me-2"></i> Facebook
                        </button>
                    </div>
                    <hr>
                    <div class="d-grid mb-2">
                        <button class=" btn-google btn-lg  btn-block btn-login fw-bold text-uppercase" type="submit">
                            <i class="fab fa-google me-2"></i> Google

                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
